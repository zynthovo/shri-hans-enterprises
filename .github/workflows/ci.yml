name: CI

# Lint + build the Next.js app on pull requests (main is handled by deploy.yml).
on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # npm install (not ci): Rive's WASM @emnapi deps resolve to different
        # patch versions per-platform, which breaks `npm ci`'s strict lock check.
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Public key is inlined at build time (optional; build works without it).
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
