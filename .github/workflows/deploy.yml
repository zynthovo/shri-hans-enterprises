name: Deploy

# On every push to main: build (gate), then deploy to the Hostinger VPS over SSH.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          missing=0
          for s in SSH_HOST SSH_USER SSH_KEY APP_DIR; do
            if [ -z "${!s}" ]; then echo "❌ Missing secret: $s"; missing=1; else echo "✅ $s is set"; fi
          done
          [ "$missing" = "0" ] || { echo "Add the missing secrets in Settings → Secrets and variables → Actions."; exit 1; }
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          APP_DIR: ${{ secrets.APP_DIR }}

      - name: Deploy over SSH (pull, build & restart on the server)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            # APP_DIR = path to the cloned repo on the server (the app root).
            cd "${{ secrets.APP_DIR }}"
            git pull --ff-only
            npm ci
            npm run build
            # Start or reload on the dedicated port from ecosystem.config.js (3005).
            pm2 startOrReload ecosystem.config.js --update-env
            pm2 save
